version: 2
updates:
  - package-ecosystem: "npm"
    # pnpm workspace: point at the root only. Dependabot runs `pnpm recursive update`
    # from the root, updating every workspace package.json and the shared lockfile.
    # Listing workspace subdirectories here is unsupported and causes errors.
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      # Consolidate all updates into a single weekly PR
      all:
        patterns:
          - "*"
    ignore:
      # Minor/patch only; keep major upgrades manual
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
