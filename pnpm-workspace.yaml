packages:
  - packages/*
  - websites/*

# Hoist Astro's bundled dependencies to the workspace root so the theme can import them while
# always tracking the exact versions Astro ships, without declaring them.
publicHoistPattern:
  - '@astrojs/markdown-satteri'
  - satteri
  - vite

dangerouslyAllowAllBuilds: true
minimumReleaseAge: 0
